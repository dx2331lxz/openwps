services:
  openwps:
    build:
      context: .
      dockerfile: Dockerfile
    image: openwps:latest
    container_name: openwps
    restart: unless-stopped
    ports:
      - "5174:5174"
    environment:
      TZ: Asia/Shanghai
      OPENWPS_HEADLESS_RENDERER_URL: http://127.0.0.1:5174/
    volumes:
      - openwps_data:/app/server/data
      - openwps_config:/app/server/config
    shm_size: "1gb"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:5174/api/health"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3

volumes:
  openwps_data:
  openwps_config:
